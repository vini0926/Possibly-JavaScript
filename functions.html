<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testing functions</title>
</head>
<style>
    label, button {
        display: block;
        margin-top: 10px;
    }
</style>
<body>
    <h1>Saudação personalizada</h1>
    <label>Digite seu nome: </label><input type="text" id="nome"/>
    <label for="hora">Selecione o horário: </label>
    <select id="hora">
        <option value="">Selecione</option>
        <option value="8">Manhã (8h)</option>
        <option value="14">Tarde (14h)</option>
        <option value="20">Noite (20h)</option>
    </select>
    <button onclick="saudar()">Mostrar saudação</button>
    <p id="mensagem"></p>
</body>
</html>
