<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 400px;
        margin: 40px auto;
    }
    label, button {
        display: block;
        margin-top: 10px;
    }
</style>
<body>
    <h1>Formulário de contato</h1>
    <form id="contactForm">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" required maxlength="50"/>

        <label for="email">Email:</label>
        <input type="email" id="email" required maxlength="256"/>

        <label for="phoneNumber">Telefone:</label>
        <input type="tel" id="phoneNumber" required maxlength="20"/>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" required maxlength="500"></textarea>

        <button type="submit">Enviar</button>
    </form>
    <script src="formtarefascript.js"></script>
</body>
</html>
